<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Cherry Petals</title>
    <meta name="description" content="View your order history and profile details at Cherry Petals.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-header {
            padding: 160px 10% 60px;
            text-align: center;
            background: radial-gradient(circle at top, #ffe1e8, var(--color-bg));
        }

        .page-header h1 {
            font-size: 3.2rem;
            margin-bottom: 10px;
        }

        .profile-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .profile-card {
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            position: relative;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: rgba(255, 183, 197, 0.4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--color-primary-dark);
            font-size: 3rem;
            margin-bottom: 10px;
            box-shadow: 0 10px 20px rgba(255, 183, 197, 0.3);
            border: 4px solid var(--color-white);
        }

        .profile-details h2 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .profile-details p {
            font-size: 1.1rem;
            color: var(--color-text-light);
        }
        
        .logout-btn-container {
            margin-top: 20px;
        }
        
        .logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #fff;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
        }
        
        .logout-btn:hover {
            background-color: #ff6b6b;
            color: white;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .order-history {
            width: 100%;
            margin-top: 40px;
            text-align: left;
        }

        .order-history h3 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255, 183, 197, 0.3);
            padding-bottom: 15px;
            font-family: var(--font-heading);
        }

        .empty-orders {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            color: var(--color-text-light);
            border: 1px dashed rgba(255, 183, 197, 0.6);
        }
        
        .empty-orders svg {
            color: var(--color-primary-dark);
            opacity: 0.6;
            margin-bottom: 15px;
        }

        /* Profile Editing Styles */
        .avatar-container {
            position: relative;
            cursor: pointer;
            border-radius: 50%;
            overflow: hidden;
            width: 120px;
            height: 120px;
            margin-bottom: 10px;
            box-shadow: 0 10px 20px rgba(255, 183, 197, 0.3);
            border: 4px solid var(--color-white);
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            background: rgba(255, 183, 197, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--color-primary-dark);
            font-size: 3rem;
            object-fit: cover;
        }

        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .avatar-container:hover .avatar-overlay {
            opacity: 1;
        }

        .edit-profile-btn {
            background: none;
            border: none;
            color: var(--color-primary-dark);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            transition: color 0.2s ease;
        }

        .edit-profile-btn:hover {
            color: var(--color-text);
            text-decoration: underline;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h3 {
            font-size: 1.5rem;
            font-family: var(--font-heading);
        }

        .close-modal-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--color-text-light);
            transition: color 0.2s ease;
        }
        
        .close-modal-btn:hover {
            color: var(--color-text);
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .modal-form .form-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 8px;
        }

        .modal-form label {
            font-weight: 500;
            color: var(--color-text);
            font-size: 0.95rem;
        }

        .modal-form .form-control {
            padding: 12px 15px;
            border: 1px solid rgba(255, 133, 161, 0.4);
            border-radius: 10px;
            font-family: var(--font-body);
            background: rgba(255, 255, 255, 0.7);
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

        <a href="index.html" class="logo-link">

        </a>

            <li>

                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
            </li>
            <li>
                <a href="cart.html" class="cart-link" id="cart-nav-link" aria-label="Cart">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--color-text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cart-icon">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
            </li>
        </ul>
    </nav>

    <header class="page-header">
        <div class="fade-in">
            <h1>My Profile</h1>
            <div class="underline"></div>
        </div>
    </header>

    <section class="section-padding" style="padding-top: 40px; min-height: 50vh;">
        <div class="profile-wrapper fade-in delay-1">
            
            <div class="profile-card glass">
                
                <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
                
                <div class="avatar-container" onclick="document.getElementById('avatar-upload').click();">
                   <img id="profile-avatar-img" class="profile-avatar" style="display: none;" alt="User Avatar">
                   <div id="profile-avatar-svg" class="profile-avatar">
                       <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                   </div>
                   <div class="avatar-overlay">
                       <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 5px;">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                            <circle cx="12" cy="13" r="4"></circle>
                       </svg>
                       Change Photo
                   </div>
                </div>
                
                <div class="profile-details">
                    <h2 id="profile-name">Loading...</h2>
                    <p id="profile-email">loading@user.com</p>
                    <button class="edit-profile-btn" onclick="openEditModal()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                        Edit Profile
                    </button>
                </div>
                
                <div class="logout-btn-container">
                    <button class="btn-primary logout-btn" onclick="mockLogout()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Log Out
                    </button>
                </div>

                <div class="order-history">
                    <h3>Recent Orders</h3>
                    <div class="empty-orders">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg>
                        <p>You haven't placed any orders yet.</p>
                        <a href="products.html" class="btn-outline" style="margin-top: 15px; display: inline-block;">Browse Collections</a>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="edit-profile-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Profile</h3>
                <button class="close-modal-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="edit-profile-form" class="modal-form" onsubmit="saveProfileChanges(event)">
                <div class="form-group">
                    <label for="edit-name">Full Name</label>
                    <input type="text" id="edit-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="edit-email">Email Address</label>
                    <input type="email" id="edit-email" class="form-control" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-outline" style="padding: 10px 20px;" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn-primary" style="padding: 10px 20px;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // DOM Elements
        const nameEl = document.getElementById('profile-name');
        const emailEl = document.getElementById('profile-email');
        const avatarImg = document.getElementById('profile-avatar-img');
        const avatarSvg = document.getElementById('profile-avatar-svg');
        const avatarUpload = document.getElementById('avatar-upload');
        const editModal = document.getElementById('edit-profile-modal');
        const editNameInput = document.getElementById('edit-name');
        const editEmailInput = document.getElementById('edit-email');

        // Load profile data exclusively for this page
        document.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            
            if (!isLoggedIn) {
                // If not logged in, boot them to login
                window.location.href = 'login.html';
                return;
            }
            
            loadProfileData();
        });

        function loadProfileData() {
            const name = localStorage.getItem('userName') || 'Beautiful Guest';
            const email = localStorage.getItem('userEmail') || 'guest@example.com';
            const customAvatar = localStorage.getItem('userAvatar');
            
            if (nameEl) nameEl.textContent = name;
            if (emailEl) emailEl.textContent = email;
            
            if (customAvatar) {
                avatarImg.src = customAvatar;
                avatarImg.style.display = 'block';
                avatarSvg.style.display = 'none';
            } else {
                avatarImg.style.display = 'none';
                avatarSvg.style.display = 'flex';
            }
        }

        // Handle Avatar Upload
        if (avatarUpload) {
            avatarUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                // Create a FileReader to convert the image to a Base64 string
                const reader = new FileReader();
                
                reader.onload = function(event) {
                    const base64Image = event.target.result;
                    // Save to local storage
                    localStorage.setItem('userAvatar', base64Image);
                    // Update UI securely
                    loadProfileData();
                };
                
                reader.readAsDataURL(file);
            });
        }

        // Modal Functions
        function openEditModal() {
            if (!editModal) return;
            
            // Populate current values
            editNameInput.value = localStorage.getItem('userName') || '';
            editEmailInput.value = localStorage.getItem('userEmail') || '';
            
            editModal.classList.add('show');
        }

        function closeEditModal() {
            if (editModal) editModal.classList.remove('show');
        }

        function saveProfileChanges(e) {
            e.preventDefault();
            
            const newName = editNameInput.value.trim();
            const newEmail = editEmailInput.value.trim();
            
            if (newName && newEmail) {
                localStorage.setItem('userName', newName);
                localStorage.setItem('userEmail', newEmail);
                
                loadProfileData();
                closeEditModal();
                
                // Show toast if available from script.js
                if (typeof showToast === 'function') {
                    showToast('Profile updated successfully!');
                }
            }
        }
    </script>
</body>

</html>
