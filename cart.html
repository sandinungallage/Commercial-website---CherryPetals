<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Cherry Petals</title>
    <meta name="description" content="View your cart and checkout at Cherry Petals.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-header {
            padding: 160px 10% 60px;
            text-align: center;
            background: radial-gradient(circle at top, #ffe1e8, var(--color-bg));
        }

        .page-header h1 {
            font-size: 3.2rem;
            margin-bottom: 10px;
        }
        
        /* Cart Page Specific Styles */
        .cart-wrapper {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        @media (min-width: 900px) {
            .cart-wrapper {
                flex-direction: row;
                align-items: flex-start;
            }
        }

        .cart-items-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            padding: 20px;
            gap: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            transition: transform 0.3s ease;
        }
        
        .cart-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 183, 197, 0.3);
        }

        .cart-item-image {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            margin-bottom: 5px;
            color: var(--color-text);
        }

        .cart-item-price {
            font-weight: 600;
            color: var(--color-primary-dark);
            font-size: 1.1rem;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.6);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 183, 197, 0.3);
        }

        .quantity-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--color-text);
            transition: color 0.2s ease;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .quantity-btn:hover {
            color: var(--color-primary-dark);
        }

        .quantity-value {
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-btn:hover {
            background: rgba(255, 107, 107, 0.1);
            transform: scale(1.1);
        }

        .cart-summary {
            flex: 1;
            padding: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(255, 183, 197, 0.2);
            position: sticky;
            top: 120px;
        }

        .cart-summary h2 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(255, 183, 197, 0.3);
            padding-bottom: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: var(--color-text-light);
        }
        
        .summary-total {
            display: flex;
            justify-content: space-between;
            margin: 25px 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-text);
            font-family: var(--font-heading);
            border-top: 2px solid rgba(255, 183, 197, 0.3);
            padding-top: 20px;
        }

        .checkout-btn {
            width: 100%;
            text-align: center;
            font-size: 1.1rem;
            padding: 16px;
        }
        
        .empty-cart-message {
            text-align: center;
            padding: 60px 20px;
            background: var(--glass-bg);
            border-radius: 20px;
            border: 1px dashed var(--color-primary-dark);
        }
        
        .empty-cart-message h3 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .coupon-section {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .coupon-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid rgba(255, 133, 161, 0.4);
            border-radius: 12px;
            font-family: var(--font-body);
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
            width: 100%;
        }

        .coupon-input:focus {
            outline: none;
            border-color: var(--color-primary-dark);
            box-shadow: 0 0 0 3px rgba(255, 133, 161, 0.2);
        }

        .coupon-btn {
            padding: 10px 20px;
            font-size: 0.95rem;
            border-radius: 12px;
        }
        
        .coupon-message {
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        
        .coupon-message.success {
            color: #27ae60;
        }
        
        .coupon-message.error {
            color: #ff6b6b;
        }
        
        @media (max-width: 600px) {
            .cart-item {
                flex-direction: column;
                text-align: center;
                position: relative;
            }
            .cart-item-actions {
                width: 100%;
                justify-content: center;
                margin-top: 10px;
            }
            .remove-btn {
                position: absolute;
                top: 15px;
                right: 15px;
            }
        }
    </style>
</head>

<body>
    <nav class="glass-nav">
        <a href="index.html" class="logo-link">
            <img src="images/logo.jpg" alt="Cherry Petals Logo" class="logo-img">
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li>
                <a href="cart.html" class="cart-link active" id="cart-nav-link" aria-label="Cart">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary-dark)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cart-icon">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
            </li>
        </ul>
    </nav>

    <header class="page-header">
        <div class="fade-in">
            <h1>Your Cart</h1>
            <div class="underline"></div>
        </div>
    </header>

    <section class="section-padding" style="padding-top: 40px; min-height: 50vh;">
        <div class="cart-wrapper fade-in delay-1">
            <div class="cart-items-section" id="cart-items-container">
                <!-- Cart items will be injected here by JS -->
            </div>
            
            <div class="cart-summary">
                <h2>Order Summary</h2>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summary-subtotal">LKR 0</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Calculated at checkout</span>
                </div>
                <div class="summary-row" id="discount-row" style="display: none; color: #ff6b6b;">
                    <span>Discount</span>
                    <span id="summary-discount">-LKR 0</span>
                </div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="summary-total">LKR 0</span>
                </div>
                
                <div class="coupon-section">
                    <input type="text" id="coupon-code" class="coupon-input" placeholder="Coupon Code">
                    <button class="btn-outline coupon-btn" onclick="applyCoupon()">Apply</button>
                </div>
                <div id="coupon-message" class="coupon-message"></div>

                <button class="btn-primary checkout-btn" onclick="checkout()">Proceed to Checkout</button>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <h2>Cherry Petals</h2>
                <p>Your premium gifting destination.</p>
            </div>
            <div class="social-links">
                <a href="https://www.facebook.com/share/1LGD14v7tM/?mibextid=wwXIfr" target="_blank"
                    class="social-link-btn" aria-label="Facebook">
                    <img src="images/Facebook_icon.png" class="social-icon" alt="Facebook">
                    <span class="social-name">Facebook</span>
                </a>
                <a href="https://wa.me/message/VE3ZSJIRPRCED1" target="_blank" class="social-link-btn"
                    aria-label="WhatsApp">
                    <img src="images/whatsapp_icon.png" class="social-icon" alt="WhatsApp">
                    <span class="social-name">WhatsApp</span>
                </a>

                    target="_blank" class="social-link-btn" aria-label="TikTok">
                    <img src="images/tiktok_icon.png" class="social-icon" alt="TikTok">
                    <span class="social-name">TikTok</span>
                </a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>Cherry Petals &copy; 2026</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
